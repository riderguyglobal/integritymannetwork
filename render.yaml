# ═══════════════════════════════════════════════════════
# Render Blueprint — Integrity Man Network
# https://render.com/docs/blueprint-spec
# ═══════════════════════════════════════════════════════

services:
  - type: web
    name: integrity-man-network
    runtime: node
    region: frankfurt          # Closest to Neon EU-Central
    plan: starter
    buildCommand: npm install --include=dev && npx prisma generate && npm run build
    startCommand: node .next/standalone/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      - key: HOSTNAME
        value: "0.0.0.0"
      - key: AUTH_TRUST_HOST
        value: "true"
      - key: DATABASE_URL
        sync: false            # Set manually in Render dashboard
      - key: NEXTAUTH_URL
        sync: false
      - key: NEXT_PUBLIC_APP_URL
        value: "https://www.integritymannetwork.com"
      - key: NEXTAUTH_SECRET
        generateValue: true    # Auto-generate a secure secret
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: PAYSTACK_SECRET_KEY
        sync: false
      - key: NEXT_PUBLIC_PAYSTACK_PUBLIC_KEY
        value: "pk_live_806d86d3d44fee610a77a4872a921089aa091680"
      - key: PAYPAL_CLIENT_ID
        sync: false
      - key: PAYPAL_CLIENT_SECRET
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
    healthCheckPath: /
    autoDeploy: true           # Deploy on every push to main
